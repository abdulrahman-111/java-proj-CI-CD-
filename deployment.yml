# voting app 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-jenkins-deploy
  labels:
    app: java-jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-jenk
      type: cd-jenk
  template:
    metadata:
      name: java-pods-jenkins
      labels:
        app: java-jenk
        type: cd-jenk
    spec:
      containers:
      - name: java-container-jenkins
        image: abdulrahman011/java-app:v32
        ports:
        - containerPort: 8090
      
---

apiVersion: v1
kind: Service
metadata:
  name: java-svc-jenkins
  labels:
    name: java-svc-jenkins
spec:
  type: NodePort
  ports:
    - targetPort: 8090
      port: 8090
      nodePort: 30009
  selector:
    app: java-jenk
    type: cd-jenk