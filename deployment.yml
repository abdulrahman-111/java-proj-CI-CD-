# voting app 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-depoy-jenkins
  labels:
    app: java-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java
      type: cd
  template:
    metadata:
      name: java-pods
      labels:
        app: java
        type: cd
    spec:
      containers:
      - name: java-container
        image: abdulrahman011/java-app:v32
        ports:
        - containerPort: 8090
      
---

apiVersion: v1
kind: Service
metadata:
  name: java-svc
  labels:
    name: java-svc
spec:
  type: NodePort
  ports:
    - targetPort: 8090
      port: 8090
      nodePort: 30008
  selector:
    app: java
    type: cd